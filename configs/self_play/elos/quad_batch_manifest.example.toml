output_directory = "configs/self_play/generated_quad_arenas"
results_directory = "/tmp/alphablokus_quad_arena_results"
num_configs = 180
duration_seconds = 300
num_concurrent_games = 64

[observability.metrics]
type = "prometheus"

[observability.logging]
type = "console"

[mcts_recorder]
type = "disabled"

[game_result_recorder]
type = "jsonl_file"
flush_row_count = 10

[game]
board_size = 20
num_moves = 30433
num_pieces = 21
num_piece_orientations = 91
move_data_file = "static/move_data/full.bin"

[[inference]]
name = "model_a"
model_path = "s3://alpha-blokus/full_v2/models_simulated/model_a.onnx"
batch_size = 64
executor = { type = "tensorrt", max_batch_size = 64, pool_size = 32 }

[[inference]]
name = "model_b"
model_path = "s3://alpha-blokus/full_v2/models_simulated/model_b.onnx"
batch_size = 64
executor = { type = "tensorrt", max_batch_size = 64, pool_size = 32 }

