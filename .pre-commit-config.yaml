repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.8
    hooks:
      - id: ruff-check
        files: ^(pyproject\.toml|tests/.*\.py|alpha_blokus/.*\.py)$
  - repo: local
    hooks:
      - id: ty-check
        name: ty-check
        language: system
        entry: ty check
        pass_filenames: false
  - repo: local
    hooks:
    - id: pytest
      name: pytest
      entry: pytest
      types: [python]
      language: python
      pass_filenames: false